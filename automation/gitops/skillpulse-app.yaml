apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: skillpulse-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: 'https://github.com/Ayushrai001/github-actions-kubernetes-masterclass.git'
    targetRevision: main
    path: k8s-prod

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
