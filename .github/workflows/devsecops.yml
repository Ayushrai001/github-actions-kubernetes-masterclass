name: SkillPulse DevSecOps Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ayushrai0001/skillpulse-backend
  FRONTEND_IMAGE: ayushrai0001/skillpulse-frontend

jobs:

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    needs: security-scan

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build \
          -t $BACKEND_IMAGE:${{ github.sha }} \
          -t $BACKEND_IMAGE:latest \
          ./backend

      - name: Build Frontend Image
        run: |
          docker build \
          -t $FRONTEND_IMAGE:${{ github.sha }} \
          -t $FRONTEND_IMAGE:latest \
          ./frontend

      - name: Push Backend Image
        run: |
          docker push $BACKEND_IMAGE:${{ github.sha }}
          docker push $BACKEND_IMAGE:latest

      - name: Push Frontend Image
        run: |
          docker push $FRONTEND_IMAGE:${{ github.sha }}
          docker push $FRONTEND_IMAGE:latest
