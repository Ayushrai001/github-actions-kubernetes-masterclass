name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ayushrai0001
  BACKEND_IMAGE: skillpulse-backend
  FRONTEND_IMAGE: skillpulse-frontend

jobs:

  build-and-scan:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t $DOCKER_USERNAME/$BACKEND_IMAGE:${{ github.sha }} ./backend

      - name: Build Frontend Image
        run: |
          docker build -t $DOCKER_USERNAME/$FRONTEND_IMAGE:${{ github.sha }} ./frontend

      - name: Install Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg lsb-release -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Scan Backend Image
        run: |
          trivy image --exit-code 1 --severity CRITICAL,HIGH $DOCKER_USERNAME/$BACKEND_IMAGE:${{ github.sha }}

      - name: Scan Frontend Image
        run: |
          trivy image --exit-code 1 --severity CRITICAL,HIGH $DOCKER_USERNAME/$FRONTEND_IMAGE:${{ github.sha }}

      - name: Push Backend Image
        run: |
          docker push $DOCKER_USERNAME/$BACKEND_IMAGE:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push $DOCKER_USERNAME/$FRONTEND_IMAGE:${{ github.sha }}
