name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ayushrai0001
  BACKEND_IMAGE: skillpulse-backend
  FRONTEND_IMAGE: skillpulse-frontend

jobs:

  # ==========================================
  # SECURITY STAGE
  # ==========================================

  sast_scan:
    name: Code Security & SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1

  secrets_scan:
    name: Code Lint & Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  compliance_scan:
    name: Infrastructure Compliance Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

  # ==========================================
  # BUILD BACKEND
  # ==========================================

  build_backend:
    name: Build Backend Service
    runs-on: ubuntu-latest

    needs:
      - sast_scan
      - secrets_scan
      - compliance_scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t $DOCKER_USERNAME/$BACKEND_IMAGE:${{ github.sha }} ./backend

      - name: Scan Backend Image
        run: |
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image \
          --severity CRITICAL,HIGH \
          $DOCKER_USERNAME/$BACKEND_IMAGE:${{ github.sha }}

      - name: Push Backend Image
        run: |
          docker push $DOCKER_USERNAME/$BACKEND_IMAGE:${{ github.sha }}

  # ==========================================
  # BUILD FRONTEND
  # ==========================================

  build_frontend:
    name: Build Frontend Service
    runs-on: ubuntu-latest

    needs:
      - sast_scan
      - secrets_scan
      - compliance_scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: |
          docker build -t $DOCKER_USERNAME/$FRONTEND_IMAGE:${{ github.sha }} ./frontend

      - name: Scan Frontend Image
        run: |
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image \
          --severity CRITICAL,HIGH \
          $DOCKER_USERNAME/$FRONTEND_IMAGE:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push $DOCKER_USERNAME/$FRONTEND_IMAGE:${{ github.sha }}

  # ==========================================
  # DEV DEPLOYMENT
  # ==========================================

  deploy_dev:
    name: Deploy Dev Manifests
    runs-on: ubuntu-latest

    needs:
      - build_backend
      - build_frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Dev
        run: |
          echo "Deploying to Dev Namespace"

  # ==========================================
  # TELEMETRY + DAST
  # ==========================================

  verify_telemetry:
    name: Verify Dev Telemetry
    runs-on: ubuntu-latest

    needs: deploy_dev

    steps:
      - name: Verify Monitoring Stack
        run: |
          echo "Checking Prometheus and Grafana"

  dast_scan:
    name: ZAP DAST Scan
    runs-on: ubuntu-latest

    needs: deploy_dev

    steps:
      - name: Run OWASP ZAP
        run: |
          echo "Running DAST Scan"

  # ==========================================
  # PRODUCTION DEPLOYMENT
  # ==========================================

  deploy_prod:
    name: Deploy Prod Manifests
    runs-on: ubuntu-latest

    needs:
      - verify_telemetry
      - dast_scan

    steps:
      - name: Deploy Production
        run: |
          echo "Deploying to Production"

  # ==========================================
  # NOTIFICATION
  # ==========================================

  deployment_status:
    name: Dispatch Deployment Status
    runs-on: ubuntu-latest

    needs: deploy_prod

    steps:
      - name: Success Notification
        run: |
          echo "Pipeline Completed Successfully"
