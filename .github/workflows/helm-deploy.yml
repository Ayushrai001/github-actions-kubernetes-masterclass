name: CD Helm Deployment

on:
  workflow_run:
    workflows: ["DevSecOps Security Pipeline"]
    types:
      - completed

jobs:

  deploy:
    name: Deploy Application to EKS
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      CLUSTER_NAME: skillpulse-cluster

    steps:

      # =========================
      # Checkout Repository
      # =========================

      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # Configure AWS Credentials
      # =========================

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================
      # Setup kubectl
      # =========================

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      # =========================
      # Setup Helm
      # =========================

      - name: Setup Helm
        uses: azure/setup-helm@v4

      # =========================
      # Update kubeconfig
      # =========================

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $CLUSTER_NAME

      # =========================
      # Verify Cluster Access
      # =========================

      - name: Verify Kubernetes Cluster
        run: |
          kubectl get nodes
          kubectl get ns

      # =========================
      # Create Namespace
      # =========================

      - name: Ensure Dev Namespace Exists
        run: |
          kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -

      # =========================
      # Deploy Backend
      # =========================

      - name: Helm Upgrade Backend
        run: |
          helm upgrade --install backend ./helm/backend \
          -n dev

      # =========================
      # Deploy Frontend
      # =========================

      - name: Helm Upgrade Frontend
        run: |
          helm upgrade --install frontend ./helm/frontend \
          -n dev

      # =========================
      # Deployment Verification
      # =========================

      - name: Verify Deployments
        run: |
          kubectl get all -n dev

      # =========================
      # Verify Services
      # =========================

      - name: Verify Services
        run: |
          kubectl get svc -n dev

      # =========================
      # Verify Pods
      # =========================

      - name: Verify Pods
        run: |
          kubectl get pods -n dev

      # =========================
      # Helm Release Status
      # =========================

      - name: Helm Status
        run: |
          helm list -n dev

      # =========================
      # Deployment Success
      # =========================

      - name: Deployment Completed
        run: |
          echo "Application deployed successfully to EKS using Helm"
