name: Helm Deployment

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: skillpulse-cluster

jobs:
  deploy:
    name: Deploy to EKS using Helm
    runs-on: ubuntu-latest

    steps:

      # =====================================================
      # CHECKOUT SOURCE CODE
      # =====================================================

      - name: Checkout Code
        uses: actions/checkout@v4

      # =====================================================
      # CONFIGURE AWS CREDENTIALS
      # =====================================================

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =====================================================
      # VERIFY AWS LOGIN
      # =====================================================

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # =====================================================
      # INSTALL KUBECTL
      # =====================================================

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # =====================================================
      # INSTALL HELM
      # =====================================================

      - name: Setup Helm
        uses: azure/setup-helm@v4

      # =====================================================
      # CONNECT TO EKS CLUSTER
      # =====================================================

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      # =====================================================
      # VERIFY CLUSTER CONNECTION
      # =====================================================

      - name: Verify Kubernetes Connection
        run: |
          kubectl get nodes
          kubectl get pods -A

      # =====================================================
      # DEPLOY FRONTEND
      # =====================================================

      - name: Helm Upgrade Frontend
        run: |
          helm upgrade --install frontend ./helm/frontend -n dev --create-namespace

      # =====================================================
      # DEPLOY BACKEND
      # =====================================================

      - name: Helm Upgrade Backend
        run: |
          helm upgrade --install backend ./helm/backend -n dev --create-namespace

      # =====================================================
      # VERIFY DEPLOYMENT
      # =====================================================

      - name: Verify Deployment
        run: |
          kubectl get pods -n dev
          kubectl get svc -n dev
