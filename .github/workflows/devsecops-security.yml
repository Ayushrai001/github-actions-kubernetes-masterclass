name: Production DevSecOps Pipeline

'on':
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

env:
  DOCKER_USERNAME: ayushrai0001
  BACKEND_IMAGE: skillpulse-backend
  FRONTEND_IMAGE: skillpulse-frontend
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

permissions:
  contents: write

concurrency:
  group: skillpulse-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =========================================================
  # STAGE 1 — YAML LINT
  # =========================================================

  yaml-lint:
    name: 📄 YAML Lint Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml

  # =========================================================
  # STAGE 2 — SECURITY & COMPLIANCE
  # =========================================================

  security-audit:
    name: 🛡️ Code Security & SAST

    needs:
      - yaml-lint

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run GoSec Scan
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          $(go env GOPATH)/bin/gosec ./backend/... || true

      - name: Run GoVulnCheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./backend/... || true

      - name: Discord Security Alert
        if: success()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🛡️ Security Audit Passed

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

  # =========================================================
  # STAGE 3 — INFRASTRUCTURE SECURITY
  # =========================================================

  iac-audit:
    name: 🏗️ Infrastructure Compliance Scan
    runs-on: ubuntu-latest

    needs:
      - security-audit

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Checkov
        run: |
          pip install checkov

      - name: Run Checkov Scan
        run: |
          checkov -d . --framework terraform,kubernetes --soft-fail

  # =========================================================
  # STAGE 4 — LINT & SECRET SCAN
  # =========================================================

  lint-audit:
    name: 🔍 Code Lint & Secrets Scan
    runs-on: ubuntu-latest

    needs:
      - iac-audit

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/path \
          zricethezav/gitleaks:latest detect \
          --source="/path" \
          --verbose \
          --exit-code 0

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          ignore: DL3008,DL3007

  # =========================================================
  # STAGE 5 — BUILD BACKEND
  # =========================================================

  build-backend:
    name: 📦 Build Backend Service

    needs:
      - lint-audit

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Docker Image
        run: |
          docker build \
          -t $DOCKER_USERNAME/$BACKEND_IMAGE:${{ github.sha }} \
          -t $DOCKER_USERNAME/$BACKEND_IMAGE:latest \
          ./backend

      - name: Run Trivy Backend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: >
            ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Docker Image
        run: |
          docker push $DOCKER_USERNAME/$BACKEND_IMAGE:${{ github.sha }}
          docker push $DOCKER_USERNAME/$BACKEND_IMAGE:latest

      - name: Discord Backend Build Alert
        if: success()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            📦 Backend Docker Image Built Successfully

            Image:
            ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  # =========================================================
  # STAGE 6 — BUILD FRONTEND
  # =========================================================

  build-frontend:
    name: 🎨 Build Frontend Service

    needs:
      - lint-audit

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend Docker Image
        run: |
          docker build \
          -t $DOCKER_USERNAME/$FRONTEND_IMAGE:${{ github.sha }} \
          -t $DOCKER_USERNAME/$FRONTEND_IMAGE:latest \
          ./frontend

      - name: Run Trivy Frontend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: >
            ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend Docker Image
        run: |
          docker push $DOCKER_USERNAME/$FRONTEND_IMAGE:${{ github.sha }}
          docker push $DOCKER_USERNAME/$FRONTEND_IMAGE:latest

      - name: Discord Frontend Build Alert
        if: success()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🎨 Frontend Docker Image Built Successfully

            Image:
            ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # =========================================================
  # STAGE 7 — SMOKE TEST
  # =========================================================

  smoke-test:
    name: 🧪 Automated Smoke Test

    needs:
      - build-backend
      - build-frontend

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Backend Tests
        run: |
          cd backend
          go test ./... -v || echo "No tests found"

  # =========================================================
  # STAGE 8 — GITOPS DEPLOYMENT
  # =========================================================

  deploy-dev:
    name: 🚀 Deploy Dev Manifests

    needs:
      - smoke-test

    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes Backend Image
        run: |
          sed -i "s|image: .*skillpulse-backend:.*|image: $DOCKER_USERNAME/$BACKEND_IMAGE:${{ github.sha }}|" k8s/skillpulse/backend-deployment.yaml

      - name: Update Kubernetes Frontend Image
        run: |
          sed -i "s|image: .*skillpulse-frontend:.*|image: $DOCKER_USERNAME/$FRONTEND_IMAGE:${{ github.sha }}|" k8s/skillpulse/frontend-deployment.yaml

      - name: Commit GitOps Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/skillpulse/*.yaml

          git commit -m "chore(gitops): update images to ${{ github.sha }} [skip ci]" || echo "No changes"

          git push

      - name: Discord Deployment Alert
        if: success()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚀 SkillPulse Deployment Successful

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}

            Kubernetes manifests updated successfully.
