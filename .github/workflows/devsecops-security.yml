name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ayushrai0001
  BACKEND_IMAGE: skillpulse-backend
  FRONTEND_IMAGE: skillpulse-frontend

jobs:

  sast_scan:
    name: Code Security & SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1

  secrets_scan:
    name: Code Lint & Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  compliance_scan:
    name: Infrastructure Compliance Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

  backend_image_scan:
    name: Scan Backend Image
    runs-on: ubuntu-latest

    needs:
      - sast_scan
      - secrets_scan
      - compliance_scan

    steps:
      - name: Scan Backend Docker Image
        run: |
          echo "Scanning backend image"

  frontend_image_scan:
    name: Scan Frontend Image
    runs-on: ubuntu-latest

    needs:
      - sast_scan
      - secrets_scan
      - compliance_scan

    steps:
      - name: Scan Frontend Docker Image
        run: |
          echo "Scanning frontend image"

  dast_scan:
    name: ZAP DAST Scan
    runs-on: ubuntu-latest

    needs:
          echo "Checking Prometheus and Grafana"
