name: CI Pipeline

on:
  push:
    branches:
      - main

    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

env:
  DOCKER_USERNAME: ayushrai0001
  BACKEND_IMAGE: skillpulse-backend
  FRONTEND_IMAGE: skillpulse-frontend

jobs:

  build-and-push:
    name: Build Backend & Frontend Services
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================
      # Backend Build & Push
      # =========================

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}

      # =========================
      # Frontend Build & Push
      # =========================

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}

      # =========================
      # Verify Images
      # =========================

      - name: Verify Docker Images
        run: |
          echo "Backend and Frontend images pushed successfully"

      # =========================
      # Artifact Metadata
      # =========================

      - name: Generate Build Metadata
        run: |
          echo "Commit SHA: $GITHUB_SHA"
          echo "Build completed successfully"
