apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: ayushrai0001/skillpulse-backend:latest

        ports:
        - containerPort: 8080

        env:
        - name: DB_HOST
          value: mysql-service

        - name: DB_PORT
          value: "3306"

        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_DATABASE

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_PASSWORD

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"

          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: dev

spec:
  selector:
    app: backend

  ports:
  - port: 8080
    targetPort: 8080
