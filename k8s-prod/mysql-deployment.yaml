apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql
        image: mysql:8.4

        ports:
        - containerPort: 3306

        envFrom:
        - secretRef:
            name: mysql-secret

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"

          limits:
            memory: "1Gi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: dev

spec:
  selector:
    app: mysql

  ports:
  - port: 3306
    targetPort: 3306
