apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dev

spec:
  replicas: 3

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: ayushrai0001/skillpulse-frontend:latest

        ports:
        - containerPort: 80

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: dev

spec:
  selector:
    app: frontend

  ports:
  - port: 80
    targetPort: 80

  type: LoadBalancer
