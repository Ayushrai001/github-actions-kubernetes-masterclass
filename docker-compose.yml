services:
  db:
    image: ${DOCKERHUB_USERNAME}/skillpulse-db:latest
    build: ./mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - skillpulse
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    
  backend:
    image: ${DOCKERHUB_USERNAME}/skillpulse-backend:latest
    build: ./backend
    restart: unless-stopped
    networks:
      - skillpulse
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: "8080"
      OLLAMA_URL: http://ollama:11434
  
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${DOCKERHUB_USERNAME}/skillpulse-frontend:latest
    build: ./frontend
    restart: unless-stopped
    networks:
      - skillpulse
    ports:
      - "80:80"
    depends_on:
      - backend

    ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - skillpulse

  ollama-setup:
    image: curlimages/curl:latest
    container_name: ollama-setup
    networks:
      - skillpulse
    depends_on:
      - ollama
    entrypoint: [ "sh", "-c", "until curl -s http://ollama:11434/api/tags >/dev/null; do sleep 1; done; echo 'Pulling tinyllama...'; curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"tinyllama\"}'" ]

volumes:
  mysql_data:
  ollama_data:
  
networks:
  skillpulse:
