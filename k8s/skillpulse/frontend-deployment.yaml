# Defines the Deployment for the Frontend service.
apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: ayushrai0001/skillpulse-frontend:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: 50m
            memory: 32Mi

          limits:
            cpu: 100m
            memory: 64Mi

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 25
          periodSeconds: 10
